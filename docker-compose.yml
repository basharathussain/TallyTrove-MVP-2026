name: tallytrove

services:

  db:
    image: postgres:15-alpine
    container_name: tallytrove-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tallytrove
      POSTGRES_USER: tallytrove
      POSTGRES_PASSWORD: tallytrove
    volumes:
      - db_data:/var/lib/postgresql/data
    # VPS: db is internal-only (no public port binding).
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tallytrove"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: tallytrove-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://tallytrove:tallytrove@db:5432/tallytrove
      - SCRAPERS_ROOT=/scrapers
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "12097:8000"      # API direct access for testing
    volumes:
      - ./backend:/app
      # scrapfly-scrapers-2026 is a sibling project used by `make index`.
      # On the VPS this sibling repo is NOT cloned by default — see deploy/README.md
      # if you want catalog indexing to work. Without it the storefront still loads,
      # search results are just empty until the indexer runs.
      - ../../scrapfly-scrapers-2026:/scrapers:ro

  storefront:
    build: ./storefront
    container_name: tallytrove-storefront
    restart: unless-stopped
    ports:
      - "12095:80"        # Customer-facing entry
    depends_on:
      - backend

  admin:
    build: ./admin
    container_name: tallytrove-admin
    restart: unless-stopped
    ports:
      - "12096:80"        # Back-office
    depends_on:
      - backend

volumes:
  db_data:
